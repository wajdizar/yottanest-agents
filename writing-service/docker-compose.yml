services:
  writing-service:
    build: .
    ports:
      - "8500:8500"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL_HEAVY=${LLM_MODEL_HEAVY:-anthropic/claude-sonnet-4}
      - LLM_MODEL_STANDARD=${LLM_MODEL_STANDARD:-anthropic/claude-sonnet-4}
      - LLM_MODEL_LIGHT=${LLM_MODEL_LIGHT:-anthropic/claude-haiku}
      - WRITE_TIMEOUT_SECONDS=${WRITE_TIMEOUT_SECONDS:-600}
      - SECTION_TIMEOUT_SECONDS=${SECTION_TIMEOUT_SECONDS:-120}
      - SECTION_CHECKER_MAX_RETRIES=${SECTION_CHECKER_MAX_RETRIES:-2}
      - RETRIEVAL_MAX_ITERATIONS=${RETRIEVAL_MAX_ITERATIONS:-3}
      - LLM_CALL_TIMEOUT_SECONDS=${LLM_CALL_TIMEOUT_SECONDS:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - .:/app
    restart: unless-stopped
